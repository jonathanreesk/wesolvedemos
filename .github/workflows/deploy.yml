name: Deploy to Odoo Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          request_pty: true
          script: |
            set -e
            rm -rf ~/montae_studio_tmp
            git clone https://github.com/jonathanreesk/wesolvedemos.git ~/montae_studio_tmp
            sudo rm -rf /odoo19/custom-addons/montae_studio
            sudo cp -r ~/montae_studio_tmp/custom-addons/montae_studio /odoo19/custom-addons/
            sudo chown -R administrator:administrator /odoo19/custom-addons/montae_studio
            rm -rf ~/montae_studio_tmp
            echo "Code updated — running Odoo upgrade..."
            sudo /usr/local/bin/odoo-deploy
            echo "Deploy complete"
