name: Deploy to Odoo Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Clone to home dir — administrator owns this, no sudo needed
            rm -rf ~/montae_studio_tmp
            git clone https://github.com/jonathanreesk/wesolvedemos.git ~/montae_studio_tmp
            # File copy — administrator owns /odoo19/custom-addons after one-time chown
            rm -rf /odoo19/custom-addons/montae_studio
            cp -r ~/montae_studio_tmp/custom-addons/montae_studio /odoo19/custom-addons/
            rm -rf ~/montae_studio_tmp
            echo "Code updated — running Odoo upgrade..."
            # Single sudo call to the deploy helper script
            sudo -n /usr/local/bin/odoo-deploy
            echo "Deploy complete"
