name: Deploy to Odoo Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /odoo19/custom-addons
            sudo rm -rf montae_studio_tmp
            sudo git clone https://github.com/jonathanreesk/wesolvedemos.git montae_studio_tmp
            sudo rm -rf montae_studio
            sudo cp -r montae_studio_tmp/custom-addons/montae_studio .
            sudo rm -rf montae_studio_tmp
            echo "Code updated — upgrading montae_studio module..."
            sudo systemctl stop odoo19
            sudo -u odoo /odoo19/odoo-server/env/bin/python3 /odoo19/odoo-server/odoo-bin \
              -c /etc/odoo19.conf \
              -d Wesolvedemo \
              -u montae_studio \
              --stop-after-init \
              --no-http
            sudo systemctl start odoo19
            echo "Deploy complete"
